<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Grand Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Đăng Nhập</h4>
                    </div>
                    <div class="card-body">
                        <div th:if="${param.error}" class="alert alert-danger">
                            Sai tên đăng nhập hoặc mật khẩu!
                        </div>
						<div th:if="${param.error}">
						    <p th:if="${session['SPRING_SECURITY_LAST_EXCEPTION'].message.contains('not active')}" 
						       style="color: red;">
						        Account is not active!
						    </p>
						    <p th:unless="${session['SPRING_SECURITY_LAST_EXCEPTION'].message.contains('not active')}" 
						       style="color: red;">
						        Invalid username or password.
						    </p>
						</div>                        
                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <small>Chưa có tài khoản? <a href="/users/register">Đăng ký ngay</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
