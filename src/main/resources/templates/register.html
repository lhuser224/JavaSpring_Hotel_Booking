<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 40px 35px; 
            width: 100%; 
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-floating > .form-control {
            border-radius: 12px;
            height: 58px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
        }
        .btn-main {
            background: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-main:hover {
            background: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            color: white;
        }
        .alert-custom {
            border-radius: 12px;
            border: none;
            background-color: #fff1f2;
            color: #be123c;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark mb-1">TẠO TÀI KHOẢN</h3>
            <p class="text-muted small">Khám phá không gian nghỉ dưỡng sang trọng</p>
        </div>

        <div th:if="${error}" class="alert alert-custom p-3 mb-4 shadow-sm" role="alert">
            <i class="fa-solid fa-circle-exclamation me-3 fs-5"></i>
            <span th:text="${error}">Thông báo lỗi sẽ hiển thị ở đây</span>
        </div>
        
        <form th:action="@{/users/register}" th:object="${user}" method="post">
            <div class="form-floating mb-3">
                <input type="text" th:field="*{fullName}" class="form-control" id="name" placeholder="Họ và tên" required>
                <label for="name text-muted">Họ và tên</label>
            </div>
            
            <div class="row g-2 mb-3">
                <div class="col-6 form-floating">
                    <input type="text" th:field="*{idPassportNumber}" class="form-control" id="id" placeholder="ID/Passport" required>
                    <label for="id">Số ID/Passport</label>
                </div>
                <div class="col-6 form-floating">
                    <input type="tel" th:field="*{phone}" class="form-control" id="phone" placeholder="Số điện thoại" required>
                    <label for="phone">Số điện thoại</label>
                </div>
            </div>

            <div class="form-floating mb-3">
                <input type="text" th:field="*{username}" class="form-control" id="user" placeholder="Tài khoản" required>
                <label for="user">Tên đăng nhập</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" th:field="*{password}" class="form-control" id="pass" placeholder="Mật khẩu" required>
                <label for="pass">Mật khẩu</label>
            </div>

            <button type="submit" class="btn btn-main w-100 mb-4 shadow-sm">
                ĐĂNG KÝ NGAY
            </button>

            <div class="text-center">
                <span class="text-muted small">Đã có tài khoản?</span>
                <a th:href="@{/login}" class="fw-bold text-dark text-decoration-none ms-1 small hover-link">Đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
