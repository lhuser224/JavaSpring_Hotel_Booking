<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hotel Room Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-4">
        <h2 class="mb-4 text-uppercase fw-bold">Chọn loại phòng</h2>
        
        <div class="row">
            <div th:each="type : ${roomTypes}" class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-body">
                        <h5 class="card-title text-primary" th:text="${type.typeName}">Single/Family</h5>
                        <p class="card-text text-muted" th:text="${type.bedDescription}">Mô tả giường</p>
                        
                        <div class="d-flex justify-content-between align-items-center">
                            <p class="mb-0 text-danger fw-bold fs-5">
                                $<span th:text="${type.basePrice}">0.00</span> / đêm
                            </p>
                            <a th:href="@{/bookings/select(typeId=${type.roomTypeId})}" class="btn btn-dark px-4">
                                Chọn phòng
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
