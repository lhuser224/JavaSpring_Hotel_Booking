<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: html_head}"></th:block>
    <title>Tùy chọn dịch vụ - Luxury Hotel</title>
    <style>
        .service-card { transition: all 0.3s; border: 1px solid #eee; border-radius: 12px; }
        .service-card:hover { border-color: #0d6efd; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .summary-box { position: sticky; top: 20px; }
        .price-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; }
        .table-custom { border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container py-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <h4 class="mb-4 fw-bold text-dark">
                    <i class="fa-solid fa-bell-concierge me-2 text-primary"></i>Dịch vụ bổ sung
                </h4>
                
                <div class="row g-3">
                    <div th:each="svc : ${extraServices}" class="col-md-6">
                        <div class="card h-100 service-card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="fw-bold mb-0 text-dark" th:text="${svc.serviceName}"></h6>
                                    <span class="badge bg-success-subtle text-success fs-6" th:text="'$' + ${svc.price}"></span>
                                </div>
                                <p class="text-muted small mb-4" th:text="${svc.description}"></p>
                                
                                <form th:action="@{/bookings/add-service}" method="post" class="row g-2 align-items-center">
                                    <input type="hidden" name="resId" th:value="${reservation.reservationId}">
                                    <input type="hidden" name="serviceId" th:value="${svc.serviceId}">
                                    <div class="col-4">
                                        <input type="number" name="quantity" value="1" min="1" max="10" class="form-control form-control-sm border-primary-subtle">
                                    </div>
                                    <div class="col-8">
                                        <button type="submit" class="btn btn-primary btn-sm w-100">
                                            <i class="fa-solid fa-cart-plus me-1"></i> Thêm vào đơn
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mt-5 border-0 shadow-sm" th:if="${reservation.reservationAddOns != null and not #lists.isEmpty(reservation.reservationAddOns)}">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="mb-0 fw-bold"><i class="fa-solid fa-list-check me-2"></i>Dịch vụ đã chọn</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">Tên dịch vụ</th>
                                        <th class="text-center">Số lượng</th>
                                        <th class="text-center">Đơn giá</th>
                                        <th class="text-end pe-3">Thành tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="addOn : ${reservation.reservationAddOns}">
                                        <td class="ps-3 fw-medium" th:text="${addOn.extraService.serviceName}"></td>
                                        <td class="text-center" th:text="${addOn.quantity}"></td>
                                        <td class="text-center text-muted" th:text="'$' + ${addOn.priceAtBooking}"></td>
                                        <td class="text-end pe-3 fw-bold text-primary" th:text="'$' + ${#numbers.formatDecimal(addOn.priceAtBooking * addOn.quantity, 1, 2)}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="summary-box">
                    <div class="card border-0 shadow-lg mb-3" style="border-radius: 15px;">
                        <div class="card-header bg-dark text-white py-3 text-center" style="border-radius: 15px 15px 0 0;">
                            <h5 class="mb-0 fw-bold text-warning">TÓM TẮT HÓA ĐƠN</h5>
                        </div>
                        <div class="card-body p-4">
                            <div class="price-item">
                                <span class="text-muted">Loại phòng:</span>
                                <span class="fw-bold" th:text="${reservation.roomType.typeName}"></span>
                            </div>
                            <div class="price-item">
                                <span class="text-muted">Đơn giá gốc:</span>
                                <span th:text="'$' + ${reservation.roomType.basePrice}"></span>
                            </div>
                            <div class="price-item" th:if="${reservation.servicePackage != null}">
                                <span class="text-muted">Gói dịch vụ (<span th:text="${reservation.servicePackage.packageName}"></span>):</span>
                                <span th:text="'+ $' + ${reservation.servicePackage.packagePrice}"></span>
                            </div>
                            <div class="price-item">
                                <span class="text-muted">Thời gian lưu trú:</span>
                                <span class="text-primary fw-bold" th:text="${nights} + ' đêm x ' + ${reservation.roomQuantity} + ' phòng'"></span>
                            </div>
                            <hr class="my-3">
                            
                            <div class="price-item">
                                <span class="text-muted">Tổng tiền phòng:</span>
                                <span class="fw-bold text-dark" th:text="'$' + ${#numbers.formatDecimal((reservation.roomType.basePrice + (reservation.servicePackage != null ? reservation.servicePackage.packagePrice : 0)) * reservation.roomQuantity * nights, 1, 2)}"></span>
                            </div>
                            
                            <div class="price-item">
                                <span class="text-muted">Tổng dịch vụ thêm:</span>
                                <span class="fw-bold text-dark" 
                                      th:with="addOnSum=${reservation.reservationAddOns != null ? #aggregates.sum(reservation.reservationAddOns.![priceAtBooking * quantity]) : 0}"
                                      th:text="'$' + ${#numbers.formatDecimal(addOnSum != null ? addOnSum : 0.0, 1, 2)}"></span>
                            </div>
                            
                            <div class="mt-4 p-3 bg-primary-subtle rounded-3 text-center border border-primary-subtle">
                                <div class="small text-primary text-uppercase fw-bold mb-1">Tổng tiền thanh toán</div>
                                <h2 class="mb-0 text-primary fw-bold">$<span th:text="${#numbers.formatDecimal(reservation.totalAmount, 1, 2)}"></span></h2>
                            </div>

                            <form th:action="@{/bookings/{id}/confirm(id=${reservation.reservationId})}" method="post" class="mt-4">
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm py-3">
                                    XÁC NHẬN ĐẶT PHÒNG <i class="fa-solid fa-circle-check ms-2"></i>
                                </button>
                            </form>
                            
                            <div class="text-center mt-3">
                                <span class="badge bg-light text-muted fw-normal p-2 border">
                                    <i class="fa-solid fa-lock me-1"></i> Bảo mật thông tin 100%
                                </span>
                            </div>
                        </div>
                    </div>

                    <a th:href="@{/}" class="btn btn-link w-100 text-decoration-none text-muted">
                        <i class="fa-solid fa-chevron-left me-1"></i> Quay lại chọn phòng khác
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(alert => {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 3000);
        });
    </script>
</body>
</html>
