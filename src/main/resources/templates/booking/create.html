<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt phòng mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-4">
        <div class="card shadow border-0 p-4">
            <h3 class="mb-4 text-primary">Thông tin đặt phòng</h3>
            <form th:action="@{/bookings/save-cart}" th:object="${reservation}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Loại phòng</label>
                        <select class="form-select" th:field="*{roomType.typeId}">
                            <option th:each="t : ${roomTypes}" th:value="${t.typeId}" th:text="${t.typeName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Gói dịch vụ</label>
                        <select class="form-select" th:field="*{servicePackage.packageId}">
                            <option th:each="p : ${packages}" th:value="${p.packageId}" th:text="${p.packageName}"></option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Ngày nhận phòng</label>
                        <input type="date" th:field="*{checkInDate}" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Ngày trả phòng</label>
                        <input type="date" th:field="*{checkOutDate}" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Số lượng phòng</label>
                        <input type="number" th:field="*{roomQuantity}" class="form-control" min="1" value="1">
                    </div>
                </div>

                <button type="submit" class="btn btn-dark w-100 py-2 mt-3">Tiếp tục tới giỏ hàng</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
