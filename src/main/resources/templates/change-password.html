<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments :: html_head}"></th:block>
    <title>Đổi Mật Khẩu | Luxury Hotel</title>
    
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .change-pw-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background: #ffffff;
        }
        .btn-dark-custom {
            background-color: #0f172a;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-dark-custom:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            color: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
            border-color: #0f172a;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4 rounded-3 shadow-sm" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>
                    <span th:text="${error}">Lỗi mật khẩu</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4 rounded-3 shadow-sm" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <span th:text="${success}">Thành công</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="change-pw-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle mb-3 shadow-sm" style="width: 70px; height: 70px;">
                            <i class="fa-solid fa-shield-halved text-dark fs-2"></i>
                        </div>
                        <h4 class="fw-bold text-dark">Thiết lập mật khẩu mới</h4>
                        <p class="text-muted small px-3">Bảo mật tài khoản là ưu tiên hàng đầu của chúng tôi. Vui lòng nhập thông tin bên dưới.</p>
                    </div>

                    <form th:action="@{/users/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary small">MẬT KHẨU HIỆN TẠI</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock-open text-muted"></i></span>
                                <input type="password" name="oldPass" class="form-control border-start-0 ps-0" 
                                       placeholder="Nhập mật khẩu cũ..." required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small">MẬT KHẨU MỚI</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-key text-muted"></i></span>
                                <input type="password" name="newPass" class="form-control border-start-0 ps-0" 
                                       placeholder="Nhập mật khẩu tối thiểu 6 ký tự..." minlength="6" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark-custom w-100 shadow">
                            <i class="fa-solid fa-paper-plane me-2"></i>CẬP NHẬT NGAY
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/" class="text-decoration-none small text-muted hover-dark">
                            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại Trang chủ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
