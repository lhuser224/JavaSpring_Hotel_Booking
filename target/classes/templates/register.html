<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký | Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 40px 30px; width: 100%; max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .form-control { border-radius: 10px; height: 55px; }
        .form-control:focus { border-color: #0f172a; box-shadow: none; }
        .btn-main { background: #0f172a; color: white; border-radius: 10px; padding: 12px; font-weight: bold; }
        .btn-main:hover { background: #1e293b; color: white; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h3 class="text-center fw-bold mb-4" style="color: #0f172a;">TẠO TÀI KHOẢN</h3>
        
        <form th:action="@{/users/register}" th:object="${user}" method="post">
            <div class="form-floating mb-3">
                <input type="text" th:field="*{fullName}" class="form-control" id="name" placeholder="Họ và tên" required>
                <label for="name">Họ và tên</label>
            </div>
            
            <div class="row g-2 mb-3">
                <div class="col-6 form-floating">
                    <input type="text" th:field="*{idPassportNumber}" class="form-control" id="id" placeholder="ID/Passport" required>
                    <label for="id">Số ID/Passport</label>
                </div>
                <div class="col-6 form-floating">
                    <input type="text" th:field="*{phone}" class="form-control" id="phone" placeholder="Số điện thoại" required>
                    <label for="phone">Số điện thoại</label>
                </div>
            </div>

            <div class="form-floating mb-3">
                <input type="text" th:field="*{username}" class="form-control" id="user" placeholder="Tài khoản" required>
                <label for="user">Tên đăng nhập</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" th:field="*{password}" class="form-control" id="pass" placeholder="Mật khẩu" required>
                <label for="pass">Mật khẩu</label>
            </div>

            <button type="submit" class="btn btn-main w-100 mb-3">Đăng Ký Ngay</button>
            <div class="text-center small">
                Đã có tài khoản? <a th:href="@{/login}" class="fw-bold text-dark text-decoration-none">Đăng nhập</a>
            </div>
        </form>
    </div>
</body>
</html>
