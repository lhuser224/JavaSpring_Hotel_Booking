<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi Mật Khẩu | Luxury Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6; /* Nền xám nhạt để làm nổi bật form trắng */
        }
        .change-pw-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            background: #fff;
        }
        .btn-dark-custom {
            background-color: #0f172a;
            color: white;
            border-radius: 8px;
            padding: 10px;
            font-weight: 500;
        }
        .btn-dark-custom:hover {
            background-color: #334155;
            color: white;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments :: navbar}"></div>

    <div class="container mt-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="change-pw-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle mb-3" style="width: 60px; height: 60px;">
                            <i class="fa-solid fa-lock text-dark fs-3"></i>
                        </div>
                        <h4 class="fw-bold">Thiết lập mật khẩu mới</h4>
                        <p class="text-muted small">Vui lòng nhập mật khẩu hiện tại và mật khẩu mới để bảo mật tài khoản.</p>
                    </div>

                    <form th:action="@{/users/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-medium small">Mật khẩu hiện tại</label>
                            <input type="password" name="oldPassword" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium small">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-dark-custom w-100">Cập nhật ngay</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
